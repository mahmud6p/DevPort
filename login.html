<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In | DevPort</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--bg2:#131720;--bg3:#1a2030;--accent:#00e5a0;--accent2:#3b82f6;--text:#e8edf5;--muted:#8892a4;--border:rgba(255,255,255,0.07);--card:#161c28;--font-head:'Syne',sans-serif;--font-mono:'Space Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,160,0.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;position:relative;z-index:1;}

.logo{text-align:center;margin-bottom:2rem;}
.logo a{font-size:1.8rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-1px;}
.logo a span{color:var(--accent);}
.logo-icon{font-size:2rem;margin-bottom:0.5rem;}

h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:0.4rem;}
.subtitle{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:2rem;}

.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:0.75rem;color:var(--accent);font-family:var(--font-mono);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;}
.form-group input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-head);font-size:0.92rem;padding:0.75rem 1rem;border-radius:10px;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--accent);}
.form-group input::placeholder{color:var(--muted);}

.forgot{text-align:right;margin-top:0.4rem;}
.forgot a{font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.forgot a:hover{color:var(--accent);}

.remember{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;font-size:0.82rem;color:var(--muted);}
.remember input{width:auto;accent-color:var(--accent);}

.btn-signin{width:100%;background:var(--accent);color:#000;border:none;padding:0.85rem;border-radius:10px;font-family:var(--font-head);font-weight:800;font-size:0.95rem;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s;margin-bottom:1rem;}
.btn-signin:hover{box-shadow:0 6px 24px rgba(0,229,160,0.4);transform:translateY(-1px);}

.divider{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:0.75rem;color:var(--muted);font-family:var(--font-mono);}

.btn-google{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:0.8rem;border-radius:10px;font-family:var(--font-head);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.75rem;transition:border-color 0.2s,background 0.2s;margin-bottom:0.75rem;}
.btn-google:hover{border-color:rgba(255,255,255,0.2);background:var(--bg2);}
.btn-google img{width:18px;height:18px;}

.btn-apple{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:0.8rem;border-radius:10px;font-family:var(--font-head);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.75rem;transition:border-color 0.2s,background 0.2s;}
.btn-apple:hover{border-color:rgba(255,255,255,0.2);background:var(--bg2);}

.register-link{text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--muted);}
.register-link a{color:var(--accent);text-decoration:none;font-weight:600;}
.register-link a:hover{text-decoration:underline;}

.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;margin-bottom:1rem;display:none;}
.success-msg{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--accent);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;margin-bottom:1rem;display:none;}

/* Tab toggle */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:0.25rem;margin-bottom:1.5rem;}
.tab{flex:1;padding:0.6rem;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--muted);transition:all 0.2s;}
.tab.active{background:var(--accent);color:#000;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <a href="devport.html">Dev<span>Port</span></a>
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Access your account</p>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create account</div>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <!-- Sign In Form -->
  <div id="signinForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="siEmail" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="siPassword" placeholder="••••••••"/>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>
    <div class="remember">
      <input type="checkbox" id="remember"/>
      <label for="remember">Keep me signed in</label>
    </div>
    <button class="btn-signin" onclick="emailSignIn()">SIGN IN</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters"/>
    </div>
    <button class="btn-signin" onclick="emailRegister()">CREATE ACCOUNT</button>
  </div>

  <div class="divider"><span>or</span></div>

  <button class="btn-google" onclick="googleLogin()">
    <img src="https://www.google.com/favicon.ico" alt="Google"/>
    Continue with Google
  </button>

  <button class="btn-apple">
    <span style="font-size:1.1rem;">🍎</span>
    Continue with Apple
  </button>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBYJXX4NTvIg20dLsR3DmnBWPuK2MCFvPg",
    authDomain: "devport-e1396.firebaseapp.com",
    projectId: "devport-e1396",
    storageBucket: "devport-e1396.firebasestorage.app",
    messagingSenderId: "650200528329",
    appId: "1:650200528329:web:92f847ea60c45d0630a418"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Redirect if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'devport.html';
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  // Google Login
  window.googleLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      await setDoc(doc(db, "users", user.uid), {
        name: user.displayName,
        email: user.email,
        photo: user.photoURL,
        lastLogin: serverTimestamp()
      }, { merge: true });
      window.location.href = 'devport.html';
    } catch (err) {
      showError("Google login failed: " + err.message);
    }
  };

  // Email Sign In
  window.emailSignIn = async function() {
    const email = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;
    if (!email || !password) { showError("Please fill all fields."); return; }
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'devport.html';
    } catch (err) {
      showError("Login failed. Check your email and password.");
    }
  };

  // Email Register
  window.emailRegister = async function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) { showError("Please fill all fields."); return; }
    if (password.length < 6) { showError("Password must be at least 6 characters."); return; }
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(result.user, { displayName: name });
      await setDoc(doc(db, "users", result.user.uid), {
        name, email,
        photo: null,
        createdAt: serverTimestamp()
      });
      showSuccess("Account created! Redirecting...");
      setTimeout(() => window.location.href = 'devport.html', 1500);
    } catch (err) {
      if (err.code === 'auth/email-already-in-use') showError("Email already in use. Please sign in.");
      else showError("Registration failed: " + err.message);
    }
  };

  // Tab switch
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab === 'signin') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('signinForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.querySelector('h1').textContent = 'Welcome Back';
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('signinForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.querySelector('h1').textContent = 'Create Account';
    }
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  };
</script>
</body>
</html>
